services:
  postgres:
    image: postgres:16-alpine
    container_name: hexsoc-postgres
    environment:
      POSTGRES_DB: hexsoc
      POSTGRES_USER: hexsoc
      POSTGRES_PASSWORD: change-me
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: